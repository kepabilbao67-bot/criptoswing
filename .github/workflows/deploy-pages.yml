name: Desplegar web (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar sitio (solo archivos web)
        run: |
          mkdir -p _site
          cp index.html styles.css app.js manifest.json sw.js icon.svg _site/

      - name: Configurar Pages (lo activa automáticamente)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
